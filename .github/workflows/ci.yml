name: CI

env:
  ZIG_VERSION: "0.15.2"

on:
  push:
    branches: [master, main]
    tags-ignore: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-musl
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows

    steps:
      - uses: actions/checkout@v6

      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: bash .github/scripts/install-zig.sh "${ZIG_VERSION}"

      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .zig-cache
            ~/.cache/zig
          key: zig-${{ matrix.target }}-${{ hashFiles('src/**/*.zig', 'build.zig', 'build.zig.zon') }}
          restore-keys: zig-${{ matrix.target }}-

      - name: Build ReleaseSmall
        run: zig build -Doptimize=ReleaseSmall

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: lnk-${{ matrix.target }}
          path: zig-out/bin/lnk${{ runner.os == 'Windows' && '.exe' || '' }}
